<!DOCTYPE html>
<html>
<head>
<title>PhishGuard AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #111827, #000000);
    background-size: 300% 300%;
    animation: gradientMove 8s ease infinite;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

/* Subtle red glow background */
body::before {
    content: "";
    position: absolute;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(255,0,60,0.2), transparent 70%);
    top: -150px;
    right: -150px;
    z-index: 0;
}

.container {
    position: relative;
    z-index: 1;
    width: 90%;
    max-width: 850px;
    padding: 50px;
    border-radius: 25px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(30px);
    border: 1px solid rgba(255,255,255,0.1);
    box-shadow: 0 0 50px rgba(255,0,60,0.1);
    position: relative;
    overflow: hidden;
    .container::before {
    content: "";
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(120deg, transparent, rgba(255,255,255,0.05), transparent);
    transform: rotate(25deg);
    animation: shine 6s linear infinite;
}

@keyframes shine {
    0% { transform: translateX(-100%) rotate(25deg); }
    100% { transform: translateX(100%) rotate(25deg); }
}
}

h1 {
    text-align: center;
    font-size: 34px;
    margin-bottom: 10px;
}

.subtitle {
    text-align: center;
    color: #9ca3af;
    margin-bottom: 40px;
}

textarea, input {
    width: 100%;
    padding: 15px;
    margin-bottom: 20px;
    border-radius: 12px;
    border: none;
    background: rgba(255,255,255,0.08);
    color: white;
    font-size: 14px;
}

textarea::placeholder,
input::placeholder {
    color: #9ca3af;
}

button {
    width: 100%;
    padding: 15px;
    border-radius: 12px;
    border: none;
    font-size: 16px;
    font-weight: bold;
    background: linear-gradient(90deg, #ef4444, #b91c1c);
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    box-shadow: 0 0 20px rgba(239,68,68,0.6);
}

/* Risk Meter Circle */
.meter-container {
    margin-top: 35px;
    text-align: center;
    display: none;
}

.circle {
    width: 150px;
    height: 150px;
    border-radius: 50%;
    background: conic-gradient(#ef4444 0deg, #1f2937 0deg);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto;
    position: relative;
    transition: 1s ease;
}

.circle::before {
    content: "";
    width: 120px;
    height: 120px;
    background: #0f172a;
    border-radius: 50%;
    position: absolute;
}

#riskPercent {
    position: relative;
    font-size: 26px;
    font-weight: bold;
}

.classification {
    margin-top: 15px;
    font-size: 22px;
    font-weight: bold;
}

/* Explainable AI Box */
.analysis-box {
    margin-top: 25px;
    padding: 20px;
    border-radius: 15px;
    background: rgba(255,255,255,0.05);
    display: none;
}

.analysis-box h3 {
    margin-bottom: 10px;
}

.analysis-box ul {
    padding-left: 20px;
    color: #d1d5db;
}

</style>
</head>

<body>

<div class="container">

<h1>🛡 PhishGuard AI</h1>
<p class="subtitle">AI-Powered Phishing Intelligence</p>

<textarea id="emailText" rows="4" placeholder="Paste email, SMS, or message..."></textarea>
<input type="text" id="urlInput" placeholder="Enter URL (optional)" />

<button onclick="analyze()">Scan Threat</button>

<div class="meter-container" id="meterContainer">
    <div class="circle" id="riskCircle">
        <div id="riskPercent">0%</div>
    </div>
    <div id="classification" class="classification"></div>
</div>

<div class="analysis-box" id="analysisBox">
    <h3>🔍 Threat Analysis</h3>
    <ul id="reasonsList"></ul>
</div>

</div>

<script>

function analyze() {

    const emailText = document.getElementById("emailText").value;
    const url = document.getElementById("urlInput").value;

    fetch("/analyze", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            email_text: emailText,
            url: url
        })
    })
    .then(response => response.json())
    .then(data => {

        const meterContainer = document.getElementById("meterContainer");
        const circle = document.getElementById("riskCircle");
        const percent = document.getElementById("riskPercent");
        const classification = document.getElementById("classification");

        meterContainer.style.display = "block";

        percent.innerText = data.risk_score + "%";

        let color = "#22c55e"; // default green

        if (data.classification === "Safe") {
            classification.innerText = "Safe";
            classification.style.color = "#22c55e";
            color = "#22c55e";
        } 
        else if (data.classification === "Suspicious") {
            classification.innerText = "Suspicious";
            classification.style.color = "#facc15";
            color = "#facc15";
        } 
        else {
            classification.innerText = "Phishing";
            classification.style.color = "#ef4444";
            color = "#ef4444";
        }

        const degree = data.risk_score * 3.6;
        circle.style.background = `conic-gradient(${color} ${degree}deg, #1f2937 ${degree}deg)`;

        // ---- Show Probabilities ----
        classification.innerHTML += `
            <div style="font-size:14px; margin-top:10px; color:#9ca3af;">
                Email Prob: ${data.email_probability}<br>
                URL Prob: ${data.url_probability}
            </div>
        `;

        // ---- Explainable AI ----
        const analysisBox = document.getElementById("analysisBox");
        const reasonsList = document.getElementById("reasonsList");

        reasonsList.innerHTML = "";

        if (data.reasons && data.reasons.length > 0) {
            analysisBox.style.display = "block";

            data.reasons.forEach(reason => {
                const li = document.createElement("li");
                li.innerText = reason;
                reasonsList.appendChild(li);
            });
        } else {
            analysisBox.style.display = "none";
        }

    });
}

</script>

</body>
</html>
